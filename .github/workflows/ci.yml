name: CI

on:
  pull_request:
    branches:
      - master
      - beta
  push:
    branches:
      - master
      - beta

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Build
        run: npm run build

      - name: Run Prettier Check
        run: npx prettier --check .
