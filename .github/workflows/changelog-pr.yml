name: Changelog PR

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog-pr:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Generate changelog
        run: npx conventional-changelog-cli@5 -p conventionalcommits -i CHANGELOG.md -s

      - name: Create pull request with changelog updates
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(changelog): update changelog [skip ci]"
          title: "docs(changelog): update changelog"
          body: |
            Atualiza automaticamente o CHANGELOG.md com base no historico de commits.

            Este PR foi criado automaticamente para respeitar a protecao da branch master.
          branch: chore/changelog-update
          base: master
          add-paths: |
            CHANGELOG.md
          labels: |
            chore
            automated
          delete-branch: true
